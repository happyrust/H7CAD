<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="64" height="64">
  <!-- Table border -->
  <rect x="2" y="3" width="20" height="18" rx="1.5"
        fill="none" stroke="#e0e0e0" stroke-width="1.5"/>
  <!-- Header row separator -->
  <line x1="2" y1="7.5" x2="22" y2="7.5" stroke="#e0e0e0" stroke-width="1.4"/>
  <!-- Column separator (status | name) -->
  <line x1="7" y1="3" x2="7" y2="21" stroke="#888" stroke-width="1"/>
  <!-- Data rows -->
  <line x1="7" y1="11.5" x2="22" y2="11.5" stroke="#888" stroke-width="1"/>
  <line x1="7" y1="15.5" x2="22" y2="15.5" stroke="#888" stroke-width="1"/>
  <!-- Layer color swatches (column 1, rows 1-3) -->
  <rect x="3" y="8.8"  width="2.5" height="1.5" rx="0.4" fill="#4cc9f0"/>
  <rect x="3" y="12.8" width="2.5" height="1.5" rx="0.4" fill="#f0c040"/>
  <rect x="3" y="16.8" width="2.5" height="1.5" rx="0.4" fill="#e05050"/>
  <!-- Name text lines (placeholder) -->
  <line x1="8.5" y1="9.5"  x2="18" y2="9.5"  stroke="#e0e0e0" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="8.5" y1="13.5" x2="16" y2="13.5" stroke="#888"    stroke-width="1.3" stroke-linecap="round"/>
  <line x1="8.5" y1="17.5" x2="17" y2="17.5" stroke="#888"    stroke-width="1.3" stroke-linecap="round"/>
  <!-- Header text line -->
  <line x1="8.5" y1="5.5" x2="19" y2="5.5" stroke="#e0e0e0" stroke-width="1.3" stroke-linecap="round"/>
</svg>
