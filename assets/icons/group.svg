<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">

  <!-- Dashed bounding box around the group -->
  <rect x="1.5" y="1.5" width="21" height="21" rx="1.5"
        fill="none" stroke="#FFD740" stroke-width="1.3"
        stroke-dasharray="3,2"/>

  <!-- Corner grip squares -->
  <rect x="0"  y="0"  width="3" height="3" fill="#FFD740"/>
  <rect x="21" y="0"  width="3" height="3" fill="#FFD740"/>
  <rect x="0"  y="21" width="3" height="3" fill="#FFD740"/>
  <rect x="21" y="21" width="3" height="3" fill="#FFD740"/>

  <!-- Object 1: small blue rect (top-left area) -->
  <rect x="4" y="4" width="7" height="5" rx="0.6"
        fill="#1565C0" stroke="#0D47A1" stroke-width="0.5"/>

  <!-- Object 2: small teal rect (bottom-right area) -->
  <rect x="13" y="14" width="7" height="5" rx="0.6"
        fill="#00695C" stroke="#004D40" stroke-width="0.5"/>

  <!-- Object 3: small line (diagonal center) -->
  <line x1="6" y1="14" x2="14" y2="6"
        stroke="#78909C" stroke-width="1.5" stroke-linecap="round"/>

</svg>
