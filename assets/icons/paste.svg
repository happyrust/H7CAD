<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Clipboard board -->
  <rect x="3" y="6" width="14" height="16" rx="1"
        fill="#455A64" stroke="#78909C" stroke-width="1"/>
  <!-- Clip at top -->
  <rect x="7" y="4" width="6" height="4" rx="1"
        fill="#546E7A" stroke="#78909C" stroke-width="0.8"/>
  <!-- Content lines -->
  <line x1="6" y1="12" x2="14" y2="12" stroke="#90A4AE" stroke-width="1"/>
  <line x1="6" y1="15" x2="14" y2="15" stroke="#90A4AE" stroke-width="1"/>
  <line x1="6" y1="18" x2="11" y2="18" stroke="#90A4AE" stroke-width="1"/>
  <!-- Arrow pointing down-left into clipboard -->
  <polyline points="19,3 19,11 15,11" fill="none"
            stroke="#FFD740" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="12,11 16,9 16,13" fill="#FFD740"/>
</svg>
