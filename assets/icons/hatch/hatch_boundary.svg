<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="64" height="64">
  <!-- Boundary: polygon outline only, no fill -->
  <polygon points="12,3 21,9 18,20 6,20 3,9"
           stroke="#e0e0e0" stroke-width="1.5" fill="none"/>
  <!-- Corner dots at vertices -->
  <circle cx="12" cy="3"  r="1.4" fill="#4cc9f0"/>
  <circle cx="21" cy="9"  r="1.4" fill="#4cc9f0"/>
  <circle cx="18" cy="20" r="1.4" fill="#4cc9f0"/>
  <circle cx="6"  cy="20" r="1.4" fill="#4cc9f0"/>
  <circle cx="3"  cy="9"  r="1.4" fill="#4cc9f0"/>
</svg>
