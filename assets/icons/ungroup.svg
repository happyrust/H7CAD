<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">

  <!-- Broken dashed bounding box (gaps at corners to suggest breaking) -->
  <rect x="1.5" y="1.5" width="21" height="21" rx="1.5"
        fill="none" stroke="#EF5350" stroke-width="1.3"
        stroke-dasharray="2,3"/>

  <!-- Corner grip squares (faded red) -->
  <rect x="0"  y="0"  width="3" height="3" fill="#EF5350" opacity="0.5"/>
  <rect x="21" y="0"  width="3" height="3" fill="#EF5350" opacity="0.5"/>
  <rect x="0"  y="21" width="3" height="3" fill="#EF5350" opacity="0.5"/>
  <rect x="21" y="21" width="3" height="3" fill="#EF5350" opacity="0.5"/>

  <!-- Breaking arrow (top-left flying away) -->
  <line x1="4" y1="4" x2="7" y2="7"
        stroke="#EF5350" stroke-width="1.2" stroke-linecap="round"
        stroke-dasharray="1.5,1.5"/>

  <!-- Object 1: small blue rect (escaping top-left) -->
  <rect x="2.5" y="2.5" width="6" height="4.5" rx="0.5"
        fill="#1565C0" stroke="#0D47A1" stroke-width="0.5"/>

  <!-- Object 2: small teal rect (escaping bottom-right) -->
  <rect x="15.5" y="16.5" width="6" height="4.5" rx="0.5"
        fill="#00695C" stroke="#004D40" stroke-width="0.5"/>

  <!-- Object 3: small line (center, also separating) -->
  <line x1="8" y1="15" x2="16" y2="8"
        stroke="#78909C" stroke-width="1.5" stroke-linecap="round"/>

</svg>
