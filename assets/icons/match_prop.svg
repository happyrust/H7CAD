<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">

  <!-- Source object: filled blue rect with property lines (upper-left) -->
  <rect x="1" y="1.5" width="10" height="8" rx="1" fill="#1565C0" stroke="#0D47A1" stroke-width="0.5"/>
  <line x1="3" y1="4"   x2="9" y2="4"   stroke="white" stroke-width="1.1"/>
  <line x1="3" y1="6.5" x2="9" y2="6.5" stroke="white" stroke-width="0.7"/>

  <!-- Paint brush body: diagonal handle -->
  <line x1="13" y1="5" x2="19.5" y2="11.5"
        stroke="#BDBDBD" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Brush tip ferrule (metal band) -->
  <rect x="10.8" y="3.2" width="3.6" height="2.4" rx="0.4"
        fill="#9E9E9E" stroke="#616161" stroke-width="0.4"
        transform="rotate(45 12.6 4.4)"/>

  <!-- Brush bristles (yellow tip) -->
  <polygon points="10.1,7.5 11.6,5.8 13.2,7.4 11.6,9.5"
           fill="#FDD835" stroke="#F9A825" stroke-width="0.3"/>

  <!-- Arrow: from source region down-right toward target -->
  <polyline points="10,10 13,13" stroke="#FFD740" stroke-width="1.4"
            stroke-linecap="round" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="5" markerHeight="5"
            refX="3" refY="2.5" orient="auto">
      <polygon points="0,0 5,2.5 0,5" fill="#FFD740"/>
    </marker>
  </defs>

  <!-- Destination object: dashed outline (lower-right), no fill -->
  <rect x="13" y="14" width="10" height="8" rx="1"
        fill="none" stroke="#78909C" stroke-width="1"
        stroke-dasharray="2.5,1.5"/>
  <!-- Faint property lines in destination (receiving) -->
  <line x1="15" y1="16.5" x2="21" y2="16.5" stroke="#546E7A" stroke-width="0.9"/>
  <line x1="15" y1="19"   x2="21" y2="19"   stroke="#546E7A" stroke-width="0.6"/>

</svg>
