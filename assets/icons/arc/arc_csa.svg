<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="64" height="64">
  <!-- Center (first=large) + radius to start + angle arc indicator -->
  <path d="M 4 18 A 11 11 0 0 1 20 6" stroke="#e0e0e0" stroke-width="2" fill="none" stroke-linecap="round"/>
  <line x1="15" y1="16" x2="4"  y2="18" stroke="#4cc9f0" stroke-width="1.5" stroke-dasharray="2 2"/>
  <line x1="15" y1="16" x2="20" y2="6"  stroke="#4cc9f0" stroke-width="1.5" stroke-dasharray="2 2"/>
  <!-- Angle arc between the two radii (r=3, centered at circle center) -->
  <path d="M 12 16.5 A 3 3 0 0 1 16.4 13.3" stroke="#4cc9f0" stroke-width="1.3" fill="none"/>
  <circle cx="15" cy="16" r="2.5" fill="#4cc9f0"/>
  <circle cx="4"  cy="18" r="1.8" fill="#4cc9f0"/>
</svg>
