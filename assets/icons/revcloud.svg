    M 4 12
    Q 4 8, 7 8
    Q 7 5, 10 5
    Q 10 3, 14 3
    Q 14 5, 17 5
    Q 17 8, 20 8
    Q 20 12, 20 15
    Q 17 15, 17 18
    Q 14 18, 14 20
    Q 10 20, 10 18
    Q 7 18, 7 15
    Q 4 15, 4 12
    Z
  " stroke="#4cc9f0" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
