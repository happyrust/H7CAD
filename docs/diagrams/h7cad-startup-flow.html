<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>H7CAD — 启动与双入口</title>
  <style>
    :root {
      --paper: #faf7f2;
      --ink: #1c1917;
      --muted: #57534e;
      --accent: #b5523a;
      --border: #d6d3d1;
      --zone: #e7e5e4;
    }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: var(--paper);
      color: var(--ink);
      padding: 2rem clamp(1rem, 4vw, 3rem);
      max-width: 720px;
    }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
    p { color: var(--muted); font-size: 0.92rem; margin: 0 0 1rem; }
    figure { margin: 0; border: 1px solid var(--border); border-radius: 8px; background: #fff; padding: 1rem; }
    figcaption { font-size: 0.78rem; color: var(--muted); margin-top: 0.65rem; }
    svg { display: block; width: 100%; height: auto; }
    .n { fill: #fff; stroke: var(--border); stroke-width: 1.2; }
    .n-a { fill: #fff8f5; stroke: var(--accent); stroke-width: 1.4; }
    .t { fill: var(--ink); font-size: 12px; font-weight: 600; }
    .st { fill: var(--muted); font-size: 10.5px; }
    .a { fill: none; stroke: var(--ink); stroke-width: 1; marker-end: url(#arr); }
  </style>
</head>
<body>
  <h1>启动与双入口</h1>
  <p><code>main.rs</code> 根据参数分流：带批处理标志时走 <code>cli::run_batch_export</code>；否则启动 <code>app::run()</code> 图形界面。</p>
  <figure>
    <svg viewBox="0 0 560 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#1c1917"/></marker>
      </defs>
      <rect class="n-a" x="200" y="24" width="160" height="40" rx="6" />
      <text class="t" x="280" y="50" text-anchor="middle">main.rs</text>
      <rect class="n" x="32" y="120" width="200" height="56" rx="6" />
      <text class="t" x="132" y="148" text-anchor="middle">CLI 批处理</text>
      <text class="st" x="132" y="164" text-anchor="middle">DXF→PDF / SVG · --options JSON</text>
      <rect class="n" x="328" y="120" width="200" height="56" rx="6" />
      <text class="t" x="428" y="148" text-anchor="middle">app::run()</text>
      <text class="st" x="428" y="164" text-anchor="middle">Iced 窗口 · 文档标签 · Scene</text>
      <path class="a" d="M252 64 L132 120" />
      <path class="a" d="M308 64 L428 120" />
      <rect class="n" x="180" y="208" width="200" height="44" rx="6" />
      <text class="t" x="280" y="236" text-anchor="middle">io / facade / store 共用加载路径</text>
      <path class="a" d="M132 176 L240 208" />
      <path class="a" d="M428 176 L320 208" />
    </svg>
    <figcaption>批处理与 GUI 共用底层 IO 与导出选项结构；GUI 额外维护视口、ribbon 与命令状态机。</figcaption>
  </figure>
</body>
</html>
